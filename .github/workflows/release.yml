name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win-x64
            platform: windows-latest
            args: '--bundles msi'
          - name: win-aarch64
            platform: windows-11-arm
            args: '--bundles msi'
          - name: darwin-x64
            platform: macos-15-intel
            args: '--bundles dmg'
          - name: darwin-aarch64
            platform: macos-latest
            args: '--bundles dmg'
          - name: linux-deb-x64
            platform: ubuntu-22.04
            args: '--bundles deb'
          - name: linux-deb-arm64
            platform: ubuntu-22.04-arm
            args: '--bundles deb'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Use tag version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');

          for (const file of ['package.json', 'package-lock.json', 'src-tauri/tauri.conf.json']) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            json.version = version;
            if (file === 'package-lock.json' && json.packages?.['']) {
              json.packages[''].version = version;
            }
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }

          for (const file of ['src-tauri/Cargo.toml', 'src-tauri/Cargo.lock']) {
            const content = fs.readFileSync(file, 'utf8')
              .replace(/(name = "feishu_docs_export"\nversion = ")[^"]+(")/, `$1${version}$2`);
            fs.writeFileSync(file, content);
          }
          NODE
          echo "Building version ${VERSION}"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Feishu Export ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseAssetNamePattern: '[name]_[version]_[platform]_[arch]_[bundle][ext]'
